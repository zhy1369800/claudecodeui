<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Claude Code UI</title>
    
    <!-- iOS PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Claude UI" />
    <link rel="apple-touch-icon" href="/logo-512.png" />
    
    <meta name="theme-color" content="#0c1117" />
    <meta name="format-detection" content="telephone=no" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0c1117;
      }
      #root {
        min-height: 100%;
      }
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #0b1220 0%, #0c1117 100%);
        color: #e5e7eb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 180ms ease;
      }
      #app-splash.app-splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      .app-splash-inner {
        text-align: center;
      }
      .app-splash-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        display: inline-block;
        margin: 0 3px;
        background: #60a5fa;
        animation: app-splash-bounce 1s infinite ease-in-out;
      }
      .app-splash-dot:nth-child(2) {
        animation-delay: 0.12s;
      }
      .app-splash-dot:nth-child(3) {
        animation-delay: 0.24s;
      }
      @keyframes app-splash-bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash-inner">
        <div style="font-size: 18px; font-weight: 600; margin-bottom: 10px;">Claude Code UI</div>
        <div>
          <span class="app-splash-dot"></span>
          <span class="app-splash-dot"></span>
          <span class="app-splash-dot"></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
